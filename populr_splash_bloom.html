<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Populr — Splash Screen</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#080010;}
  body{
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    overflow:hidden;position:relative;
    min-height:100vh;
    font-family:'DM Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .bg-glow{
    position:fixed;inset:0;
    background:radial-gradient(ellipse 80% 70% at 50% 50%,
      rgba(139,53,200,.45) 0%,
      rgba(59,31,160,.28) 35%,
      rgba(240,90,40,.08) 65%,
      transparent 80%);
    animation:ambientBreath 4s ease-in-out infinite alternate;
    pointer-events:none;z-index:0;
  }
  @keyframes ambientBreath{
    from{opacity:.65;transform:scale(1);}
    to{opacity:1;transform:scale(1.1);}
  }

  .particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
  .p{position:absolute;border-radius:50%;animation:floatUp linear infinite;}
  @keyframes floatUp{
    0%{transform:translateY(0) scale(1);opacity:0;}
    8%{opacity:1;}
    88%{opacity:.5;}
    100%{transform:translateY(-110vh) scale(.15);opacity:0;}
  }

  .stage{
    position:relative;z-index:10;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    gap:36px;
  }

  /* Stationary anchor holds halo, petals, rings — never spins */
  .lifemark-anchor{
    position:relative;
    width:220px;height:220px;
    display:flex;align-items:center;justify-content:center;
  }

  /* Layer 1 (outer): scale ONLY */
  .scale-layer{
    position:absolute;
    width:220px;height:220px;
    display:flex;align-items:center;justify-content:center;
    will-change:transform;
  }

  /* Layer 2 (inner): rotate ONLY */
  .rotate-layer{
    width:220px;height:220px;
    display:flex;align-items:center;justify-content:center;
    will-change:transform;
  }

  /* THE FIX: clip wrapper forces a hard circle clip on the JPEG.
     box-shadow on the wrapper glows around the circle, not the square.
     overflow:hidden clips the square JPEG corners. */
  .lifemark-clip{
    width:220px;height:220px;
    border-radius:50%;
    overflow:hidden;             /* clips JPEG square corners to circle */
    /* Glow lives here — on the circle, not the image */
    box-shadow:
      0 0 40px 12px rgba(139,53,200,.75),
      0 0 80px 24px rgba(240,90,40,.4);
    animation:clipGlow 3.2s ease-in-out 2.6s infinite alternate;
    flex-shrink:0;
  }
  @keyframes clipGlow{
    from{box-shadow:0 0 30px 8px rgba(139,53,200,.6), 0 0 60px 16px rgba(240,90,40,.3);}
    to  {box-shadow:0 0 56px 20px rgba(139,53,200,1), 0 0 112px 32px rgba(240,90,40,.75);}
  }

  .lifemark-img{
    width:220px;height:220px;
    display:block;
    /* No border-radius here — the clip wrapper handles it */
    /* No drop-shadow here — box-shadow on wrapper handles it */
  }

  /* Halo ring */
  .lifemark-halo{
    position:absolute;
    width:244px;height:244px;
    border-radius:50%;
    border:2px solid transparent;
    background:
      linear-gradient(#080010,#080010) padding-box,
      conic-gradient(from 0deg,
        rgba(59,125,216,.9)  0%,
        rgba(139,53,200,.9) 25%,
        rgba(240,90,40,.9)  50%,
        rgba(200,54,106,.9) 75%,
        rgba(59,125,216,.9) 100%) border-box;
    opacity:0;
    animation:haloSpin 7s linear 2.4s infinite, haloFadeIn .7s ease-out 2.2s forwards;
  }
  @keyframes haloSpin{from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  @keyframes haloFadeIn{from{opacity:0;} to{opacity:1;} }

  /* Petals */
  .petals{
    position:absolute;
    width:220px;height:220px;
    opacity:0;
  }
  .petal{
    position:absolute;top:50%;left:50%;
    width:22px;height:40px;
    margin-left:-11px;margin-top:-40px;
    transform-origin:center bottom;
    opacity:0;
  }
  .petal svg{width:100%;height:100%;}

  /* Pulse rings */
  .rings{
    position:absolute;
    width:220px;height:220px;
    display:flex;align-items:center;justify-content:center;
    pointer-events:none;
  }
  .ring{
    position:absolute;border-radius:50%;
    animation:ringExpand 2.8s ease-out infinite;
  }
  .ring:nth-child(1){animation-delay:.1s;}
  .ring:nth-child(2){animation-delay:.85s;}
  .ring:nth-child(3){animation-delay:1.6s;}
  @keyframes ringExpand{
    0%  {transform:scale(.6);opacity:0;}
    10% {opacity:.5;}
    100%{transform:scale(2.6);opacity:0;}
  }

  /* Wordmark */
  .wordmark-wrap{
    display:flex;flex-direction:column;align-items:center;gap:12px;
    opacity:0;
    transition:opacity .8s ease, transform .8s ease;
    transform:translateY(16px) scale(.94);
  }
  .wordmark-wrap.visible{opacity:1;transform:translateY(0) scale(1);}
  .wordmark-img{height:52px;width:auto;}
  .tagline{
    font-size:10.5px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;
    color:rgba(210,180,255,.6);text-align:center;
    opacity:0;transition:opacity .8s ease .4s;
  }
  .tagline.visible{opacity:1;}

  .replay{
    position:fixed;bottom:22px;right:22px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.18);
    color:rgba(255,255,255,.6);
    border-radius:24px;padding:7px 18px;
    font-size:12px;letter-spacing:.07em;cursor:pointer;
    transition:all .2s;font-family:sans-serif;z-index:99;
  }
  .replay:hover{background:rgba(255,255,255,.18);color:#fff;}
</style>
</head>

<script>
const COLORS=['#8B35C8','#F05A28','#3B7DD8','#C8366A','#6BB8F0','#E0367A','#F5A623'];

// Particles
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<30;i++){
    const p=document.createElement('div');
    p.className='p';
    const sz=2+(i%5), col=COLORS[i%COLORS.length];
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${8+(i*3.1)%84}%;top:${30+(i*2.9)%55}%;background:${col};animation-duration:${4+(i%5)}s;animation-delay:${(i*.27)%8}s;box-shadow:0 0 ${sz*3}px ${col};`;
    c.appendChild(p);
  }
})();

// Petals
(function(){
  const wrap=document.getElementById('petals');
  const ks=document.createElement('style');
  ks.textContent=`
    @keyframes petalPop{
      0%  {opacity:0; transform:rotate(var(--r)) scaleX(var(--sx)) scaleY(0);}
      62% {opacity:1; transform:rotate(var(--r)) scaleX(var(--sx)) scaleY(1.08);}
      80% {          transform:rotate(var(--r)) scaleX(var(--sx)) scaleY(.97);}
      100%{opacity:1; transform:rotate(var(--r)) scaleX(var(--sx)) scaleY(1);}
    }
    @keyframes petalFade{from{opacity:0;}to{opacity:1;}}
    @keyframes petalSpin{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
  `;
  document.head.appendChild(ks);
  const cols=['rgba(255,255,255,.9)','rgba(240,228,255,.82)','rgba(255,238,248,.88)','rgba(215,195,255,.78)'];
  for(let i=0;i<10;i++){
    const angle=(360/10)*i, sx=.72+(i%3)*.14;
    const d=document.createElement('div');
    d.className='petal';
    d.style.setProperty('--r',`${angle}deg`);
    d.style.setProperty('--sx',sx);
    d.style.transform=`rotate(${angle}deg) scaleX(${sx})`;
    d.style.animation=`petalPop .9s cubic-bezier(.34,1.42,.64,1) ${2.1+(i*.07)}s both`;
    d.innerHTML=`<svg viewBox="0 0 24 44" fill="none"><path d="M12 42C12 42 2 31 2 19C2 9 7 2 12 2C17 2 22 9 22 19C22 31 12 42 12 42Z" fill="${cols[i%4]}"/><path d="M12 3C12 3 12 24 12 40" stroke="rgba(160,110,220,.22)" stroke-width="1"/></svg>`;
    wrap.appendChild(d);
  }
  setTimeout(()=>{
    wrap.style.animation='petalFade .4s ease-out forwards, petalSpin 22s linear infinite';
  }, 2050);
})();

// Scale and rotate on separate elements — smooth GPU compositing
const DURATION = 2200;
const DELAY    = 120;

document.getElementById('scaleLayer').animate(
  [
    { transform: 'scale(1)',    offset: 0    },
    { transform: 'scale(4.8)', offset: 0.19 },
    { transform: 'scale(4.8)', offset: 0.43 },
    { transform: 'scale(1.04)',offset: 0.80 },
    { transform: 'scale(.98)', offset: 0.89 },
    { transform: 'scale(1)',   offset: 1    },
  ],
  { duration: DURATION, delay: DELAY, fill: 'both', easing: 'ease-in-out' }
);

document.getElementById('rotateLayer').animate(
  [
    { transform: 'rotate(0deg)'   },
    { transform: 'rotate(720deg)' },
  ],
  { duration: DURATION, delay: DELAY, fill: 'both', easing: 'ease-in-out' }
);

// Wordmark reveal after animation settles
setTimeout(()=>{
  document.getElementById('wordmark').classList.add('visible');
  setTimeout(()=>document.getElementById('tagline').classList.add('visible'), 350);
}, DELAY + DURATION + 150);
</script>
</body>
</html>
